services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '8000:80'
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - '3001:3001'
      - '8081:3001'
    environment:
      - PORT=3001

  # 本地代码执行沙箱
  sandbox:
    build:
      context: ./sandbox
    ports:
      - '3002:3002'
    volumes:
      - sandbox_data:/workspace
    restart: unless-stopped

  # LiveKit WebRTC SFU 服务器 — 语音/视频通话信令与媒体转发
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - '7880:7880'     # WebSocket 信令
      - '7881:7881'     # gRPC
      - '7882:7882'     # HTTP
      - '50000-60000:50000-60000'  # WebRTC 媒体端口
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml --node-ip=127.0.0.1
    restart: unless-stopped
    network_mode: host

volumes:
  sandbox_data:
